generated_at: 2026-03-28
purpose: >-
  Track btcli->taocli compatibility as a spec-driven matrix. btcli behavior is the
  oracle for command availability, flag semantics, prompts, stdout/stderr, exit
  codes, JSON shape, and edge-case behavior.
status_legend:
  live_tested:
    meaning: Behavior was exercised against real btcli and taocli/agcli on this machine.
  regression_tested:
    meaning: Behavior is pinned by taocli/agcli automated tests.
  partial:
    meaning: Only a subset of btcli semantics is matched or exercised.
  unsupported_by_design:
    meaning: taocli intentionally fails fast with a compatibility message.
  untested:
    meaning: Not yet compared carefully enough against btcli.
priorities:
  - wallet
  - stake
  - registration
  - subnet_admin_reads
  - weights_commit_reveal
known_global_caveats:
  - >-
    btcli localnet weights commands are not currently a reliable oracle on this host/runtime;
    upstream btcli hits missing-storage issues on the tested Docker local chain.
  - >-
    Several parity wins so far are bounded to empty-state or missing-wallet paths; success-path
    parity across full-network flows and richer errors is still incomplete.
