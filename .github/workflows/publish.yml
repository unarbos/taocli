name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-sdist:
    name: Publish sdist to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: uv pip install --system build twine hatchling
      - name: Build source distribution
        run: python -m build --sdist
      - name: Publish source distribution to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_KEY }}
        run: twine upload --verbose dist/*.tar.gz --skip-existing

  publish-wheels:
    name: Publish wheel (${{ matrix.label }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runs-on: ubuntu-latest
            os_name: linux
            arch: x86_64
            wheel_tag: py3-none-manylinux_2_28_x86_64
          - label: linux-aarch64
            runs-on: ubuntu-24.04-arm
            os_name: linux
            arch: aarch64
            wheel_tag: py3-none-manylinux_2_28_aarch64
          - label: macos-x86_64
            runs-on: macos-15-intel
            os_name: darwin
            arch: x86_64
            wheel_tag: py3-none-macosx_10_13_x86_64
          - label: macos-aarch64
            runs-on: macos-14
            os_name: darwin
            arch: aarch64
            wheel_tag: py3-none-macosx_11_0_arm64
    steps:
      - uses: actions/checkout@v4
      - name: Check out agcli source
        uses: actions/checkout@v4
        with:
          repository: unarbos/agcli
          ref: main
          path: agcli-src
      - uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: agcli-src
      - name: Install build tools
        run: uv pip install --system build twine hatchling
      - name: Build agcli release binary
        run: cargo build --manifest-path agcli-src/Cargo.toml --release
      - name: Bundle agcli binary into taocli package
        run: |
          mkdir -p "src/taocli/bin/${{ matrix.os_name }}/${{ matrix.arch }}"
          cp "agcli-src/target/release/agcli" "src/taocli/bin/${{ matrix.os_name }}/${{ matrix.arch }}/agcli"
          chmod +x "src/taocli/bin/${{ matrix.os_name }}/${{ matrix.arch }}/agcli"
      - name: Build platform wheel
        env:
          TAOCLI_WHEEL_TAG: ${{ matrix.wheel_tag }}
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: python -m build --wheel
      - name: Publish platform wheel to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_KEY }}
        run: twine upload --verbose dist/*.whl --skip-existing

  publish:
    name: Publish summary
    runs-on: ubuntu-latest
    needs: [publish-sdist, publish-wheels]
    if: always()
    steps:
      - name: Confirm publish jobs completed
        run: echo "Publish jobs finished"
