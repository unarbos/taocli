name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv pip install --system ruff mypy click
      - name: Ruff check
        run: ruff check src/ tests/
      - name: Ruff format check
        run: ruff format --check src/ tests/
      - name: Mypy
        run: mypy src/taocli/ --ignore-missing-imports

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv pip install --system -e . pytest pytest-cov
      - name: Run tests
        run: pytest tests/ -v --tb=short

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv pip install --system -e . pytest pytest-cov
      - name: Run tests with coverage
        run: pytest tests/ --cov=taocli --cov-report=xml --cov-report=term-missing --cov-fail-under=100
      - name: Upload coverage to Codecov
        if: github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: coverage.xml
          fail_ci_if_error: false
          verbose: true
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

  publish-sdist:
    name: Publish sdist to PyPI
    runs-on: ubuntu-latest
    needs: [lint, test, coverage]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: uv pip install --system build twine hatchling
      - name: Build source distribution
        run: python -m build --sdist
      - name: Publish source distribution to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_KEY }}
        run: twine upload --verbose dist/*.tar.gz --skip-existing

  publish-wheels:
    name: Publish wheel (${{ matrix.label }})
    runs-on: ${{ matrix.runs-on }}
    needs: [lint, test, coverage]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runs-on: ubuntu-latest
            os_name: linux
            arch: x86_64
            wheel_tag: py3-none-manylinux_2_28_x86_64
          - label: linux-aarch64
            runs-on: ubuntu-24.04-arm
            os_name: linux
            arch: aarch64
            wheel_tag: py3-none-manylinux_2_28_aarch64
          - label: macos-x86_64
            runs-on: macos-15-intel
            os_name: darwin
            arch: x86_64
            wheel_tag: py3-none-macosx_10_13_x86_64
          - label: macos-aarch64
            runs-on: macos-14
            os_name: darwin
            arch: aarch64
            wheel_tag: py3-none-macosx_11_0_arm64
    steps:
      - uses: actions/checkout@v4
      - name: Check out agcli source
        uses: actions/checkout@v4
        with:
          repository: unarbos/agcli
          ref: main
          path: agcli-src
      - uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: agcli-src
      - name: Install build tools
        run: uv pip install --system build twine hatchling
      - name: Build agcli release binary
        run: cargo build --manifest-path agcli-src/Cargo.toml --release
      - name: Bundle agcli binary into taocli package
        run: |
          mkdir -p "src/taocli/bin/${{ matrix.os_name }}/${{ matrix.arch }}"
          cp "agcli-src/target/release/agcli" "src/taocli/bin/${{ matrix.os_name }}/${{ matrix.arch }}/agcli"
          chmod +x "src/taocli/bin/${{ matrix.os_name }}/${{ matrix.arch }}/agcli"
      - name: Build platform wheel
        env:
          TAOCLI_WHEEL_TAG: ${{ matrix.wheel_tag }}
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: python -m build --wheel
      - name: Publish platform wheel to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_KEY }}
        run: twine upload --verbose dist/*.whl --skip-existing

  publish:
    name: Publish summary
    runs-on: ubuntu-latest
    needs: [publish-sdist, publish-wheels]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Confirm publish jobs completed
        run: echo "Publish jobs finished"
